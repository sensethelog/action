name: Test Logytics Action

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'

jobs:
  test-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create test log
        run: |
          cat > test-output.log << 'TESTLOG'
          > jest --coverage

          FAIL src/utils.test.js
            ● validateInput › should reject invalid email

              TypeError: Cannot read properties of undefined (reading 'email')

                40 |   const validateInput = (data) => {
                41 |     if (!data) throw new Error('Data required');
              > 42 |     return data.email.includes('@');
                   |                ^
                43 |   };

                at validateInput (src/utils.js:42:16)
                at Object.<anonymous> (src/utils.test.js:15:5)

          Test Suites: 1 failed, 1 total
          Tests:       1 failed, 2 passed, 3 total
          TESTLOG

      - name: Run failing test
        run: |
          cat test-output.log
          exit 1

      - name: Logytics Analysis
        if: failure()
        uses: logytics-pro/action@v1
        with:
          logytics-api-key: ${{ secrets.LOGYTICS_API_KEY }}
