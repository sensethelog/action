name: Test Logytics Action

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'

jobs:
  test-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run failing test
        run: |
          echo "Running tests..."
          echo "Test 1: PASSED"
          echo "Test 2: PASSED"
          echo "Test 3: FAILED"
          echo ""
          echo "Error: Expected 'success' but got 'failure'"
          echo "  at Object.<anonymous> (src/utils.test.js:42:10)"
          echo "  at Module._compile (internal/modules/cjs/loader.js:1085:14)"
          exit 1

      - name: Logytics Analysis
        if: failure()
        uses: ./
        with:
          logytics-api-key: ${{ secrets.LOGYTICS_API_KEY }}
